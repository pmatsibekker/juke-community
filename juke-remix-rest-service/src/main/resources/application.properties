# Enable virtual threads ? one thread per request, no pool exhaustion
spring.threads.virtual.enabled=true

# ---------------------------------------------------------------------------
# Database ? H2 embedded (default, zero install)
# Data is stored in ./jukedb.mv.db and persists across restarts.
# Hibernate manages the schema automatically; no migration scripts required.
# ---------------------------------------------------------------------------
spring.datasource.url=jdbc:h2:file:${user.home}/.juke/jukedb;AUTO_SERVER=TRUE;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=juke
spring.datasource.password=juke_dev_password

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=false

# H2 web console ? http://localhost:8080/h2-console
# JDBC URL in the console: jdbc:h2:file:./jukedb
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---------------------------------------------------------------------------
# Playwright runner
# ---------------------------------------------------------------------------
juke.playwright.working-dir=${PLAYWRIGHT_WORKING_DIR:../juke-sample-ui-service/src/web-app}
juke.playwright.spec-output-dir=tests/generated

# ---------------------------------------------------------------------------
# Phase 7 - coverage capture (off by default; opt-in per run / per environment)
# ---------------------------------------------------------------------------
# Master switch. Both JaCoCo and NYC capture branches are skipped when this
# is false, even if the per-scope flags below are on.
juke.coverage.enabled=false

# Distinct runs whose coverage payloads are kept. Older runs get their
# use_case_coverage rows wiped by the retention sweeper after each new save.
juke.coverage.retention-runs=20

# Universe filter for counters and dead-code analysis. Leave empty to include
# everything (rarely useful - third-party classes pollute the report).
juke.coverage.include-packages=org.juke.*,com.example.*

# JaCoCo TCP-server agent (Java backend coverage). Off by default per the
# Phase 7 design. To enable, launch the JVM with:
#   -javaagent:jacocoagent.jar=output=tcpserver,address=*,port=6300,append=false
# then flip these flags on:
juke.coverage.jacoco.enabled=false
juke.coverage.jacoco.host=localhost
juke.coverage.jacoco.port=6300
juke.coverage.jacoco.connect-timeout-ms=2000
juke.coverage.jacoco.read-timeout-ms=30000
# target/classes roots that define the class universe for the analyzer.
juke.coverage.jacoco.classes-paths=\
  ../juke-framework/target/classes,\
  ../juke-remix-rest-service/target/classes

# Istanbul / NYC (browser coverage). Off by default. Requires the web app
# to be running with BABEL_ENV=coverage (see juke-sample-ui-service/web-app
# package.json's start:coverage script).
juke.coverage.nyc.enabled=false
